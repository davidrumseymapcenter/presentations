<!DOCTYPE html>
<html>
  <head>
    <title>sanfrancisco.tif</title>
    <meta http-equiv="content-type" content="text/html; charset=utf-8" />
    <meta http-equiv="imagetoolbar" content="no" />
    <style type="text/css">
      v\:* {
        behavior: url(#default#VML);
      }
      html,
      body {
        overflow: hidden;
        padding: 0;
        height: 100%;
        width: 100%;
        font-family: "Lucida Grande", Geneva, Arial, Verdana, sans-serif;
      }
      body {
        margin: 10px;
        background: #fff;
      }
      h1 {
        margin: 0;
        padding: 6px;
        border: 0;
        font-size: 20pt;
      }
      #header {
        height: 43px;
        padding: 0;
        background-color: #eee;
        border: 1px solid #888;
      }
      #subheader {
        height: 12px;
        text-align: right;
        font-size: 10px;
        color: #555;
      }
      #map {
        height: 100%;
        width: 100%;
      }
    </style>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.css"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/gh/openlayers/openlayers.github.io@main/dist/en/v7.0.0/legacy/ol.js"></script>
    <script src="https://unpkg.com/ol-layerswitcher@4.1.1"></script>
    <link
      rel="stylesheet"
      href="https://unpkg.com/ol-layerswitcher@4.1.1/src/ol-layerswitcher.css"
    />
    <style>
      .ol-control {
        left: 10px !important; /* Keep them on the left */
        right: auto !important;
      }

      .ol-zoom,
      .ol-mouse-position {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        background-color: rgba(
          200,
          200,
          200,
          0.8
        ); /* Light gray with slight transparency */
        padding: 10px;
        border-radius: 8px;
      }

      /* Make the zoom buttons larger */
      .ol-zoom .ol-zoom-in,
      .ol-zoom .ol-zoom-out {
        width: 40px;
        height: 40px;
        font-size: 20px;
      }

      /* Make the mouse position text larger */
      .custom-mouse-position {
        font-size: 16px;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="map" class="map"></div>
    <div id="mouse-position"></div>
    <script type="text/javascript">
      var mousePositionControl = new ol.control.MousePosition({
        className: "custom-mouse-position",
        target: document.getElementById("mouse-position"),
        undefinedHTML: "&nbsp;",
      });
      var map = new ol.Map({
        controls: ol.control.defaults.defaults().extend([mousePositionControl]),
        target: "map",

        layers: [
          new ol.layer.Group({
            title: "Overlay",
            layers: [
              new ol.layer.Tile({
                title: "Overlay",
                // opacity: 0.7,
                source: new ol.source.TileImage({
                  attributions: "",
                  tileGrid: new ol.tilegrid.TileGrid({
                    extent: [0, -14161, 21322, 0],
                    origin: [0, -14161],
                    resolutions: [128, 64, 32, 16, 8, 4, 2, 1],
                    tileSize: [256, 256],
                  }),
                  tileUrlFunction: function (tileCoord) {
                    return "./{z}/{x}/{y}.png"
                      .replace("{z}", String(tileCoord[0]))
                      .replace("{x}", String(tileCoord[1]))
                      .replace("{y}", String(-1 - tileCoord[2]));
                  },
                }),
              }),
            ],
          }),
        ],
        view: new ol.View({
          center: [10661.0, -7080.5],
          resolution: 10.0,
        }),
      });
    </script>
  </body>
</html>
